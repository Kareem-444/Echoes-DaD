<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Echoes | Join the Void</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be_Vietnam_Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {

                    "error": "#ba1a1a",

                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#474553",

                    "outline": "#787584",
                    "tertiary-fixed-dim": "#6edab4",
                    "surface-tint": "#584fbc",
                    "on-background": "#1c1c1a",
                    "on-primary-fixed-variant": "#3f35a2",
                    "primary-fixed-dim": "#c5c0ff",
                    "surface-dim": "#dcdad6",
                    "on-primary-container": "#aba5ff",
                    "on-surface": "#1c1c1a",
                    "primary-container": "#3b309e",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#f6f3ef",
                    "on-tertiary-fixed-variant": "#00513d",
                    "on-tertiary-fixed": "#002117",
                    "surface-container-highest": "#e5e2de",
                    "background": "#fcf9f5",
                    "secondary-fixed": "#9df4d2",
                    "on-secondary": "#ffffff",
                    "surface-container-high": "#eae8e4",
                    "on-secondary-fixed-variant": "#00513d",
                    "on-primary-fixed": "#140067",
                    "on-tertiary": "#ffffff",
                    "error-container": "#ffdad6",

                    "primary": "#241188",

                    "inverse-on-surface": "#f3f0ec",
                    "outline-variant": "#c8c4d5",
                    "secondary-fixed-dim": "#82d7b7",
                    "secondary": "#006c52",
                    "surface-variant": "#e5e2de",
                    "surface-container": "#f0ede9",
                    "surface-bright": "#fcf9f5",
                    "tertiary": "#003325",
                    "on-tertiary-container": "#54c29d",
                    "on-error": "#ffffff",
                    "inverse-primary": "#c5c0ff",
                    "on-secondary-fixed": "#002117",
                    "inverse-surface": "#31302e",
                    "on-primary": "#ffffff",
                    "tertiary-fixed": "#8af7cf",
                    "surface": "#fcf9f5"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Be Vietnam Pro"],
                    "label": ["Be Vietnam Pro"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Be_Vietnam_Pro', sans-serif; }
        .font-headline { font-family: 'Plus_Jakarta_Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .bg-primary-gradient { background: linear-gradient(135deg, #3b309e 0%, #534ab7 100%); }
        .bg-transition-gradient { background: linear-gradient(135deg, #534ab7 0%, #5dcaa5 100%); }
        .abstract-shape { opacity: 0.15; filter: blur(40px); position: absolute; z-index: 0; pointer-events: none; }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Floating Geometric Background Elements -->
<div class="abstract-shape w-96 h-96 bg-primary-container rounded-full -top-20 -left-20"></div>
<div class="abstract-shape w-80 h-80 bg-secondary-container rounded-full bottom-20 -right-20"></div>
<div class="abstract-shape w-64 h-64 bg-tertiary-fixed-dim rounded-full top-1/2 left-1/3 opacity-10"></div>
<!-- Main Authentication Shell -->
<main class="relative z-10 w-full max-w-[440px]">
<div class="bg-surface-container-low rounded-xl p-10 shadow-[0px_4px_24px_rgba(83,74,183,0.08)]">
<!-- Branding Header -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary-gradient rounded-[1.5rem] flex items-center justify-center mb-4 shadow-lg">
<span class="material-symbols-outlined text-white text-3xl" data-icon="tsunami">tsunami</span>
</div>
<h1 class="font-headline font-extrabold text-4xl tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-[#3b309e] to-[#534ab7]">
                    Echoes
                </h1>
<p class="text-on-surface-variant text-sm mt-2 font-medium">Whisper into the digital ether.</p>
</div>
<!-- Navigation Tabs -->
<div class="flex bg-surface-container-high p-1.5 rounded-full mb-8">
<button class="flex-1 py-3 text-sm font-semibold rounded-full bg-surface-container-lowest text-primary shadow-sm transition-all duration-300">
                    Sign Up
                </button>
<button class="flex-1 py-3 text-sm font-semibold text-on-surface-variant hover:text-primary transition-all duration-300">
                    Sign In
                </button>
</div>
<!-- Sign Up Form (Active by default) -->
<form class="space-y-6">
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-4">Your private email</label>
<input class="w-full bg-background border-none rounded-lg px-6 py-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary-container/40 transition-all outline-none" placeholder="anonymous@echo.es" type="email"/>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-4">Create a passphrase</label>
<div class="relative">
<input class="w-full bg-background border-none rounded-lg px-6 py-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary-container/40 transition-all outline-none" placeholder="••••••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant cursor-pointer hover:text-primary transition-colors" data-icon="visibility_off">visibility_off</span>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-4">Confirm passphrase</label>
<input class="w-full bg-background border-none rounded-lg px-6 py-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary-container/40 transition-all outline-none" placeholder="••••••••••••" type="password"/>
</div>
<!-- Identity Note -->
<div class="flex items-start gap-3 p-4 bg-surface-container-high/50 rounded-lg">
<span class="material-symbols-outlined text-primary-container text-xl mt-0.5" data-icon="shield_person">shield_person</span>
<p class="text-xs text-on-surface-variant leading-relaxed">
                        Your identity remains detached from your Echoes. We do not store real names, only your unique digital signature.
                    </p>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-gradient text-on-primary font-bold py-5 rounded-full shadow-lg hover:scale-[1.02] active:scale-95 transition-all duration-300 flex items-center justify-center gap-2" type="submit">
<span>Create My Echo</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward_ios">arrow_forward_ios</span>
</button>
</form>
<!-- Secondary Action Links -->
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant">
                    By entering, you agree to our 
                    <a class="text-primary font-semibold hover:underline" href="#">Fluid Privacy</a>
</p>
</div>
</div>
<!-- Hidden Sign In State (Layout Reference) -->

                <input type="email" class="w-full bg-background border-none rounded-lg px-6 py-4 ...">
            </div>
            <div class="space-y-2">
                <div class="flex justify-between items-center px-4">

                </div>
                <input type="password" class="w-full bg-background border-none rounded-lg px-6 py-4 ...">
            </div>
            <button class="w-full bg-transition-gradient ...">Enter the Void</button>
        </div>
        -->
</main>
<!-- Visual Anchor / Footer Decorative -->
<div class="fixed bottom-12 left-0 w-full flex justify-center pointer-events-none opacity-40">
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<div class="w-2 h-2 rounded-full bg-tertiary-fixed-dim"></div>
</div>
</div>
</body></html>
