<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Echoes — Share a Secret</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error": "#ffffff",
                    "inverse-primary": "#c5c0ff",
                    "on-secondary-fixed": "#002117",
                    "surface-variant": "#e5e2df",
                    "on-tertiary-container": "#d2cdff",
                    "tertiary": "#403b76",
                    "surface-bright": "#fcf9f5",
                    "surface-container": "#f0edea",
                    "surface": "#fcf9f5",
                    "inverse-surface": "#30302e",
                    "on-primary": "#ffffff",
                    "tertiary-fixed": "#e4dfff",
                    "error-container": "#ffdad6",
                    "tertiary-container": "#58538f",
                    "primary-fixed": "#e3dfff",
                    "primary": "#3b309e",
                    "inverse-on-surface": "#f3f0ed",
                    "background": "#fcf9f5",
                    "secondary-fixed": "#8af7cf",
                    "on-secondary-fixed-variant": "#00513d",
                    "on-primary-fixed": "#140067",
                    "surface-container-high": "#eae8e4",
                    "on-secondary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "outline-variant": "#c8c4d5",
                    "secondary-fixed-dim": "#6edab4",
                    "secondary": "#006c52",
                    "on-primary-container": "#d1ccff",
                    "on-surface": "#1b1c1a",
                    "primary-container": "#534ab7",
                    "surface-container-highest": "#e5e2df",
                    "on-tertiary-fixed": "#18114c",
                    "on-tertiary-fixed-variant": "#443f7a",
                    "surface-container-low": "#f6f3f0",
                    "on-error-container": "#93000a",
                    "on-secondary-container": "#007257",
                    "outline": "#787584",
                    "tertiary-fixed-dim": "#c6c0ff",
                    "error": "#ba1a1a",
                    "secondary-container": "#8af7cf",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#474553",
                    "surface-dim": "#dcdad6",
                    "surface-tint": "#584fbc",
                    "on-background": "#1b1c1a",
                    "on-primary-fixed-variant": "#3f35a3",
                    "primary-fixed-dim": "#c5c0ff"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans", "sans-serif"],
                    "body": ["Be Vietnam Pro", "sans-serif"],
                    "label": ["Be Vietnam Pro", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .echo-bubble {
            border-top-left-radius: 3rem;
            border-top-right-radius: 3rem;
            border-bottom-left-radius: 0.5rem;
            border-bottom-right-radius: 3rem;
        }
        .bg-sanctuary {
            background: linear-gradient(135deg, #fcf9f5 0%, #e1f5ee 100%);
        }
        .signature-gradient {
            background: linear-gradient(135deg, #3b309e 0%, #534ab7 100%);
        }
        
        /* Shimmer Effect */
        .shimmer-btn {
            position: relative;
            overflow: hidden;
        }
        .shimmer-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.1) 40%,
                rgba(255, 255, 255, 0.4) 50%,
                rgba(255, 255, 255, 0.1) 60%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(45deg);
            animation: shimmer 4s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-150%) rotate(45deg); }
            100% { transform: translateX(150%) rotate(45deg); }
        }

        /* Floating Background Shapes */
        .float-shape {
            position: absolute;
            opacity: 0.08;
            pointer-events: none;
            animation: float 20s infinite linear;
        }
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(20px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 15px) rotate(240deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }
        .shape-slow { animation-duration: 30s; }
        .shape-slower { animation-duration: 40s; }
    </style>
</head>
<body class="bg-sanctuary min-h-screen text-on-surface font-body overflow-hidden selection:bg-primary/20">
<!-- Animated Background Layer -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<!-- Circles -->
<div class="float-shape top-[10%] left-[5%]" style="animation-delay: -2s;">
<svg height="120" viewbox="0 0 100 100" width="120"><circle class="text-primary" cx="50" cy="50" fill="currentColor" r="40"></circle></svg>
</div>
<div class="float-shape shape-slow bottom-[15%] right-[10%]" style="animation-delay: -5s;">
<svg height="80" viewbox="0 0 100 100" width="80"><circle class="text-secondary" cx="50" cy="50" fill="currentColor" r="40"></circle></svg>
</div>
<!-- Triangles -->
<div class="float-shape shape-slower top-[40%] right-[15%]" style="animation-delay: -10s;">
<svg height="100" viewbox="0 0 100 100" width="100"><polygon class="text-primary" fill="currentColor" points="50,15 90,85 10,85"></polygon></svg>
</div>
<div class="float-shape bottom-[30%] left-[12%]" style="animation-delay: -15s;">
<svg height="60" viewbox="0 0 100 100" width="60"><polygon class="text-tertiary" fill="currentColor" points="50,15 90,85 10,85"></polygon></svg>
</div>
<!-- Hexagons -->
<div class="float-shape shape-slow top-[70%] left-[40%]" style="animation-delay: -8s;">
<svg height="90" viewbox="0 0 100 100" width="90"><path class="text-primary" d="M50 5 L89 27.5 L89 72.5 L50 95 L11 72.5 L11 27.5 Z" fill="currentColor"></path></svg>
</div>
</div>
<!-- Top Navigation Anchor -->
<header class="bg-[#fcf9f5]/60 dark:bg-[#1a1b1e]/60 backdrop-blur-xl shadow-sm shadow-[#3b309e]/5 fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4">
<div class="text-2xl font-bold tracking-tight text-[#3b309e] dark:text-[#534ab7] font-headline">
        Echoes
    </div>
<div class="flex items-center gap-4">
<button class="text-[#474553] dark:text-[#e5e2df] hover:opacity-80 transition-opacity active:scale-95 duration-200 flex items-center justify-center p-1">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center px-6 pt-20 pb-32 z-10">
<div class="w-full max-w-3xl flex flex-col h-full items-center justify-center">
<!-- Label Content -->
<div class="mb-8 text-center">
<span class="text-primary font-label text-sm tracking-[0.2em] font-medium uppercase opacity-60">The Void is Listening</span>
</div>
<!-- The Echo Bubble (Focused Text Area) -->
<div class="echo-bubble bg-surface-container-lowest w-full flex-grow flex flex-col p-8 md:p-12 shadow-[0px_4px_24px_rgba(83,74,183,0.08)] transition-all duration-300 relative group">
<textarea autofocus="" class="w-full h-full bg-transparent border-none focus:ring-0 text-2xl md:text-4xl font-headline text-on-surface placeholder-on-surface-variant/30 resize-none leading-relaxed" maxlength="500" oninput="document.getElementById('char-count').innerText = this.value.length" placeholder="Let your thoughts drift into the void..."></textarea>
<!-- Character Counter -->
<div class="absolute bottom-6 right-8 md:bottom-8 md:right-12">
<span class="text-xs font-label text-on-surface-variant/40" id="char-count">0</span><span class="text-xs font-label text-on-surface-variant/20"> / 500</span>
</div>
</div>
<!-- Secondary Affirmation Label -->
<p class="mt-6 text-on-surface-variant font-label text-center text-sm opacity-60 max-w-md leading-relaxed">
            Your thoughts are encrypted and anonymous. Once echoed, they drift into the collective consciousness.
        </p>
</div>
</main>
<!-- Bottom Actions Container -->
<div class="fixed bottom-0 left-0 w-full px-6 pb-12 md:pb-16 flex justify-center pointer-events-none z-20">
<div class="w-full max-w-md pointer-events-auto">
<button class="shimmer-btn w-full py-6 rounded-full signature-gradient text-on-primary font-headline font-bold text-xl shadow-xl hover:shadow-2xl hover:scale-[1.02] active:scale-[0.97] transition-all duration-300 flex items-center justify-center gap-3">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span>Echo</span>
</button>
</div>
</div>
<!-- Mobile Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full md:hidden flex justify-around items-end pb-6 px-4 bg-[#fcf9f5]/80 dark:bg-[#1a1b1e]/80 backdrop-blur-2xl z-50 rounded-t-[3rem] shadow-[0_-12px_40px_rgba(59,48,158,0.06)]">
<!-- Feed Tab -->
<div class="flex flex-col items-center justify-center text-[#474553] dark:text-[#e5e2df] p-2 hover:text-[#3b309e] transition-all duration-300 cursor-pointer">
<span class="material-symbols-outlined" data-icon="rss_feed">rss_feed</span>
<span class="font-label text-[10px] tracking-wide">Feed</span>
</div>
<!-- Write Tab (ACTIVE) -->
<div class="flex flex-col items-center justify-center bg-[#534ab7] text-white rounded-full p-3 mb-2 scale-110 shadow-lg transition-all duration-300 cursor-default">
<span class="material-symbols-outlined" data-icon="edit_note" style="font-variation-settings: 'FILL' 1;">edit_note</span>
<span class="font-label text-[10px] tracking-wide">Write</span>
</div>
<!-- Matches Tab -->
<div class="flex flex-col items-center justify-center text-[#474553] dark:text-[#e5e2df] p-2 hover:text-[#3b309e] transition-all duration-300 cursor-pointer">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
<span class="font-label text-[10px] tracking-wide">Matches</span>
</div>
<!-- Profile Tab -->
<div class="flex flex-col items-center justify-center text-[#474553] dark:text-[#e5e2df] p-2 hover:text-[#3b309e] transition-all duration-300 cursor-pointer">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label text-[10px] tracking-wide">Profile</span>
</div>
</nav>
<!-- Hidden decorative gradient for extra sanctuary feel -->
<div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
<div class="absolute -top-1/4 -left-1/4 w-[150%] h-[150%] bg-[radial-gradient(circle_at_center,rgba(59,48,158,0.03)_0%,transparent_60%)]"></div>
</div>
</body></html>
